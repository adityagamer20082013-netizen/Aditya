<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:rgba(0,0,0,0.8);
padding-top:20px;
display:none;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#00ffcc;
color:black;
}

/* MAIN */
.main{
margin-left:210px;
padding:20px;
display:none;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
padding:15px;
margin:10px;
border-radius:15px;
backdrop-filter:blur(10px);
}

/* INPUT */
input{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

/* BUTTON */
button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#42e695,#7873f5);
color:white;
cursor:pointer;
}

/* RAINBOW */
.rainbow{
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h1 class="rainbow">Choco SMP Login</h1>

<div class="card">
<h3>User Login</h3>
<input id="userEmail" placeholder="Email">
<input id="userPass" type="password" placeholder="Password">
<button onclick="loginUser()">Login</button>
</div>

<div class="card">
<h3>Admin Login</h3>
<input id="adminEmail" placeholder="Email">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h2 class="rainbow">Choco SMP</h2>
<a href="#" onclick="showPage('home')">Home</a>
<a href="#" onclick="showPage('server')">Server</a>
<a href="#" onclick="showPage('community')">Community</a>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div id="home" class="card">
<h2>Welcome Gamer 😎</h2>
<p id="time"></p>
</div>

<div id="server" class="card" style="display:none;">
<h2>🎮 Server</h2>
<p>IP: play.chocosmp.fun</p>
<button onclick="copyIP()">Copy IP</button>
</div>

<div id="community" class="card" style="display:none;">
<h2>🌐 Community</h2>
<a href="https://discord.gg/dNhUUsaz75"><button>Discord</button></a>
<a href="https://www.youtube.com/channel/UCMhd7jqZzvhtqrkVOqgrmKg"><button>YouTube</button></a>
<a href="https://www.instagram.com/edit_with_awais/"><button>Instagram</button></a>
</div>

<div id="adminPanel" class="card" style="display:none;">
<h2>👑 Admin Panel</h2>
<p>Server Controls</p>
<button>Start Server</button>
<button>Stop Server</button>
<button>Restart Server</button>
</div>

</div>

<!-- 🎧 YOUTUBE MUSIC (PLAYS ONCE, NO RESTART) -->
<iframe 
id="musicFrame"
width="0" 
height="0"
src="https://www.youtube.com/embed/Ex49z5brxbA?autoplay=1&loop=1&playlist=Ex49z5brxbA&controls=0" 
frameborder="0" 
allow="autoplay">
</iframe>

<script>
// LOGIN DATA
const userE="chocosmp@gmail.com";
const userP="chocosmp123";

const adminE="admin@gmail.com";
const adminP="admin2013";

// USER LOGIN
function loginUser(){
if(userEmail.value===userE && userPass.value===userP){
startSite("user");
}else alert("Wrong User ❌");
}

// ADMIN LOGIN
function loginAdmin(){
if(adminEmail.value===adminE && adminPass.value===adminP){
startSite("admin");
}else alert("Wrong Admin ❌");
}

// START SITE (IMPORTANT FIX - DOES NOT RELOAD MUSIC)
function startSite(type){
document.getElementById("loginPage").style.display="none";
document.getElementById("sidebar").style.display="block";
document.getElementById("main").style.display="block";

if(type==="admin"){
hideAll();
document.getElementById("adminPanel").style.display="block";
}else{
showPage("home");
}
}

// PAGE SWITCH
function showPage(page){
hideAll();
document.getElementById(page).style.display="block";
}

function hideAll(){
document.querySelectorAll(".main .card").forEach(el=>el.style.display="none");
}

// LOGOUT (DOES NOT TOUCH MUSIC)
function logout(){
location.reload();
}

// TIME
setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
},1000);

// COPY IP
function copyIP(){
navigator.clipboard.writeText("play.chocosmp.fun");
alert("Copied ✅");
}
</script>

</body>
</html>
