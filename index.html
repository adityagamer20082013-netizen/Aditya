<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

/* CLOUDFARE */
#loader{
position:fixed;width:100%;height:100%;
background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;
}
.cf-box{text-align:center;color:black;}
.cf-logo{font-size:28px;color:#f48120;font-weight:bold;}
.cf-bar{width:220px;height:6px;background:#eee;margin:10px auto;border-radius:10px;overflow:hidden;}
.cf-fill{width:0;height:100%;background:#f48120;animation:load 3s forwards;}
@keyframes load{100%{width:100%;}}

/* LOGIN */
#loginPage{
display:none;height:100vh;background:#0f2027;color:white;
justify-content:center;align-items:center;flex-direction:column;
}
.login-box{background:#111;padding:20px;border-radius:12px;margin:10px;}

input{padding:10px;margin:5px;border:none;border-radius:8px;width:200px;}
button{padding:10px;border:none;border-radius:8px;background:#f48120;color:white;cursor:pointer;}

/* USER SIDEBAR */
.sidebar{
position:fixed;width:220px;height:100%;
background:#111;padding-top:20px;display:none;
}
.sidebar a{display:block;padding:15px;color:white;cursor:pointer;}
.sidebar a:hover{background:#f48120;}

.main{
margin-left:220px;padding:20px;display:none;background:#0f2027;color:white;min-height:100vh;
}

/* ADMIN PANEL */
.admin{
display:none;background:#0d1117;color:white;height:100vh;
}
.admin-sidebar{
width:220px;background:#111;position:fixed;height:100%;
padding:10px;
}
.admin-sidebar h2{color:#f48120;}
.admin-sidebar div{
padding:12px;margin-top:10px;cursor:pointer;
}
.admin-sidebar div:hover{background:#f48120;}

.admin-main{
margin-left:220px;padding:20px;
}

/* CARDS */
.card{
background:#161b22;padding:15px;border-radius:10px;margin:10px 0;
}

/* CONSOLE */
#console{
height:200px;background:black;color:#0f0;padding:10px;overflow:auto;font-family:monospace;
}

/* STATS */
.stat{
background:#161b22;padding:15px;border-radius:10px;margin:10px 0;
}
.bar{
height:8px;background:#333;border-radius:10px;overflow:hidden;margin-top:5px;
}
.fill{
height:100%;background:#f48120;width:0%;
}
</style>
</head>

<body>

<!-- CLOUDFARE -->
<div id="loader">
<div class="cf-box">
<div class="cf-logo">Cloudflare</div>
<div class="cf-bar"><div class="cf-fill"></div></div>
<p>Checking your browser...</p>
</div>
</div>

<!-- LOGIN -->
<div id="loginPage">
<h2>Login</h2>

<div class="login-box">
<h3>User</h3>
<input id="userEmail">
<input id="userPass" type="password">
<button onclick="loginUser()">Login</button>
</div>

<div class="login-box">
<h3>Admin</h3>
<input id="adminEmail">
<input id="adminPass" type="password">
<button onclick="loginAdmin()">Login</button>
</div>
</div>

<!-- USER -->
<div class="sidebar" id="sidebar">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('server')">Server</a>
<a onclick="showPage('community')">Community</a>
<button onclick="logout()">Logout</button>
</div>

<div class="main" id="main">
<div id="home">Welcome 👑</div>
<div id="server" style="display:none;">IP: play.chocosmp.fun</div>

<div id="community" style="display:none;">
<h3>Chat</h3>
<div id="chatBox"></div>
<input id="msg"><button onclick="send()">Send</button>
</div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">

<div class="admin-sidebar">
<h2>Admin</h2>
<div onclick="openTab('dashboard')">Dashboard</div>
<div onclick="openTab('consoleTab')">Console</div>
<div onclick="openTab('settings')">Settings</div>
</div>

<div class="admin-main">

<div id="dashboard">
<div class="card">
<h3>Status: <span id="status">Stopped</span></h3>
<button onclick="startServer()">Start</button>
<button onclick="stopServer()">Stop</button>
</div>

<div class="stat">
CPU
<div class="bar"><div class="fill" id="cpu"></div></div>
</div>

<div class="stat">
RAM
<div class="bar"><div class="fill" id="ram"></div></div>
</div>

<div class="stat">
Network
<div class="bar"><div class="fill" id="net"></div></div>
</div>

</div>

<div id="consoleTab" style="display:none;">
<div id="console"></div>
<input id="cmd"><button onclick="runCmd()">Run</button>
</div>

</div>
</div>

<script>
setTimeout(()=>{loader.style.display="none";loginPage.style.display="flex";},3000);

const userEmail="chocosmp@gmail.com";
const userPass="chocosmp123";
const adminEmail="admin@gmail.com";
const adminPass="admin2013";

function loginUser(){
if(userEmail==userEmail && userPass==userPass){
loginPage.style.display="none";
sidebar.style.display="block";
main.style.display="block";
}
}

function loginAdmin(){
if(
document.getElementById("adminEmail").value===adminEmail &&
document.getElementById("adminPass").value===adminPass
){
loginPage.style.display="none";
admin.style.display="block";
}
}

function showPage(id){
document.querySelectorAll("#main div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

function logout(){location.reload();}

/* SERVER */
function startServer(){
status.innerText="Starting...";
setTimeout(()=>{status.innerText="Running";},2000);
}

function stopServer(){
status.innerText="Stopped";
}

/* STATS */
setInterval(()=>{
cpu.style.width=Math.random()*100+"%";
ram.style.width=Math.random()*100+"%";
net.style.width=Math.random()*100+"%";
},1000);

/* CONSOLE */
function runCmd(){
let cmd=document.getElementById("cmd").value;
console.innerHTML+="<div>> "+cmd+"</div><div>Executed ✔️</div>";
}

/* ADMIN TABS */
function openTab(id){
document.querySelectorAll(".admin-main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
