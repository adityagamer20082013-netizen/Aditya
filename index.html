<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdityaGamerYT Dashboard</title>
<style>
html, body { margin:0; padding:0; font-family:sans-serif; background:#000; color:#fff; text-align:center; overflow-x:hidden; }
h1 { margin:20px 0; }
#userBgVideo {
  position:fixed; top:0; left:0; width:100%; height:100%;
  object-fit:cover; z-index:-2; filter:brightness(0.4);
}
#login, #dashboard, #adminPanel { padding:20px; }
.card { background:rgba(0,0,0,0.5); margin:15px auto; padding:20px; border-radius:15px; width:300px; }
button { padding:10px 20px; margin:8px; border:none; border-radius:10px; background:linear-gradient(45deg,#42e695,#7873f5); color:white; cursor:pointer; }
button:hover { opacity:0.9; }
</style>
</head>
<body>

<h1>AdityaGamerYT Dashboard 🌧️</h1>

<!-- Video background only for users -->
<video autoplay muted loop id="userBgVideo" style="display:none;">
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- Login Panel -->
<div id="login">
  <div class="card">
    <h3>User Login</h3>
    <input type="text" id="phone" placeholder="Phone Number"><br>
    <input type="text" id="otp" placeholder="OTP"><br>
    <button onclick="loginUser()">Login as User</button>
  </div>
  <div class="card">
    <h3>Admin Login</h3>
    <input type="text" id="adminEmail" placeholder="Email"><br>
    <input type="password" id="adminPass" placeholder="Password"><br>
    <button onclick="loginAdmin()">Login as Admin</button>
  </div>
</div>

<!-- User Dashboard -->
<div id="dashboard" style="display:none;">
  <div class="card">
    <h3>Welcome User 🌧️</h3>
    <p>This is your dashboard with background video!</p>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none;">
  <div class="card">
    <h3>Welcome Admin 👑</h3>
    <p>No background video here.</p>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<script>
// Login details
const allowedPhone="7696044754", otpCode="2013";
const adminEmailFixed="admin@gmail.com", adminPasswordFixed="admin2013";

// Login functions
function loginUser(){
  const phone=document.getElementById("phone").value;
  const otp=document.getElementById("otp").value;
  if(phone===allowedPhone && otp===otpCode){
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("userBgVideo").style.display="block"; // show video for user
  } else { alert("Wrong user credentials!"); }
}

function loginAdmin(){
  const email=document.getElementById("adminEmail").value;
  const pass=document.getElementById("adminPass").value;
  if(email===adminEmailFixed && pass===adminPasswordFixed){
    document.getElementById("login").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("userBgVideo").style.display="none"; // hide video for admin
  } else { alert("Wrong admin credentials!"); }
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
