<!DOCTYPE html>
<html>
<head>
  <title>AdityaGamerYT 🔥</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(45deg, red, blue, purple, cyan);
      background-size: 400% 400%;
      animation: bg 8s infinite;
      color: white;
      text-align: center;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      width: 220px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: lime;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: lime;
      color: black;
      transform: scale(1.1);
    }

    #dashboard {
      display: none;
      margin-top: 30px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      width: 260px;
    }

    .promo {
      margin-top: 20px;
      font-size: 18px;
      color: yellow;
    }
  </style>
</head>

<body>

<h1>🔥 AdityaGamerYT 🔥</h1>

<div id="login">

  <input type="text" id="phone" placeholder="Enter Phone Number"><br>

  <button onclick="fakeOTP()">Send OTP</button><br>

  <input type="text" id="otp" placeholder="Enter OTP"><br>

  <button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h2>🔥 Welcome to AdityaGamerYT 🔥</h2>

  <div class="promo">
    👉 Follow on Instagram & Subscribe on YouTube to join my gaming world 😎🔥
  </div>

  <div class="card">
    <h3>📸 Instagram</h3>
    <a href="https://instagram.com/_btwitsadityagg" target="_blank">
      <button>😎 Follow Now</button>
    </a>
  </div>

  <div class="card">
    <h3>📺 YouTube</h3>
    <a href="https://www.youtube.com/@AdityaGamerYT-s-3p" target="_blank">
      <button>🔥 Subscribe Now</button>
    </a>
  </div>

</div>

<script>
  const allowedPhone = "8872529805";
  const secretCode = "2013";

  function fakeOTP(){
    const phone = document.getElementById("phone").value;

    if(phone === allowedPhone){
      alert("OTP Sent to your number 📱 (Code: 2013)");
    } else {
      alert("Number not allowed ❌");
    }
  }

  function login(){
    const phone = document.getElementById("phone").value;
    const code = document.getElementById("otp").value;

    if(phone === allowedPhone && code === secretCode){
      document.getElementById("login").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    } else {
      alert("Access Denied ❌");
    }
  }
</script>

</body>
</html>
