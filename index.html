<!DOCTYPE html>
<html>
<head>
  <title>AdityaGamerYT 🔥</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(45deg, red, blue, purple, cyan);
      background-size: 400% 400%;
      animation: bg 8s infinite;
      color: white;
      text-align: center;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    input {
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      width: 230px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: lime;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: lime;
      color: black;
      transform: scale(1.1);
    }

    #dashboard, #adminPanel {
      display: none;
      margin-top: 30px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      width: 260px;
    }
  </style>
</head>

<body>

<h1>🔥 AdityaGamerYT 🔥</h1>

<!-- USER LOGIN -->
<div id="login">
  <h2>User Login 🔐</h2>

  <input type="text" id="phone" placeholder="Enter Phone Number"><br>
  <button onclick="fakeOTP()">Send OTP</button><br>
  <input type="text" id="otp" placeholder="Enter OTP"><br>
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin">
  <h2>Admin Login 👑</h2>

  <input type="text" id="adminEmail" placeholder="Enter Gmail"><br>
  <input type="password" id="adminPass" placeholder="Enter Password"><br>
  <button onclick="adminLogin()">Login Admin</button>
</div>

<!-- USER DASHBOARD -->
<div id="dashboard">

  <h2 id="welcomeText">🔥 Welcome to AdityaGamerYT 🔥</h2>
  <p>👉 Follow & Subscribe 😎🔥</p>

  <div class="card">
    <a href="https://instagram.com/_btwitsadityagg" target="_blank">
      <button>📸 Instagram</button>
    </a>
  </div>

  <div class="card">
    <a href="https://www.youtube.com/@AdityaGamerYT-s-3p" target="_blank">
      <button>📺 YouTube</button>
    </a>
  </div>

  <button onclick="logout()">🔄 Logout</button>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <h2>👑 Admin Panel</h2>

  <!-- 🔥 GIF ADDED HERE -->
  <div class="card">
    <h3>🔥 Admin Vibes</h3>
    <img src="https://media.giphy.com/media/qgQUggAC3Pfv687qPC/giphy.gif"
         style="width:100%; border-radius:20px;">
  </div>

  <h3>Change Welcome Text</h3>
  <input type="text" id="newText" placeholder="New Text">
  <button onclick="changeText()">Update</button>

  <button onclick="logout()">🔄 Logout</button>

</div>

<script>
  const allowedPhone = "8872529805";
  const otpCode = "2013";

  const adminEmailFixed = "admin@gmail.com";
  const adminPasswordFixed = "admin2013";

  function fakeOTP(){
    const phone = document.getElementById("phone").value;

    if(phone === allowedPhone){
      alert("OTP Sent 📱 (Code: 2013)");
    } else {
      alert("Number not allowed ❌");
    }
  }

  function login(){
    const phone = document.getElementById("phone").value;
    const otp = document.getElementById("otp").value;

    if(phone === allowedPhone && otp === otpCode){

      document.getElementById("login").style.display = "none";
      document.getElementById("adminLogin").style.display = "none";
      document.getElementById("adminPanel").style.display = "none";

      document.getElementById("dashboard").style.display = "block";

    } else {
      alert("Wrong details ❌");
    }
  }

  function adminLogin(){
    const email = document.getElementById("adminEmail").value;
    const pass = document.getElementById("adminPass").value;

    if(email === adminEmailFixed && pass === adminPasswordFixed){

      document.getElementById("login").style.display = "none";
      document.getElementById("adminLogin").style.display = "none";
      document.getElementById("dashboard").style.display = "none";

      document.getElementById("adminPanel").style.display = "block";

    } else {
      alert("Wrong Admin Login ❌");
    }
  }

  function changeText(){
    const text = document.getElementById("newText").value;
    document.getElementById("welcomeText").innerText = text;
  }

  function logout(){
    location.reload();
  }
</script>

</body>
</html>
