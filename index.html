<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

/* CLOUDFARE */
#loader{
position:fixed;width:100%;height:100%;
background:white;display:flex;justify-content:center;
align-items:center;z-index:9999;
}
.cf-box{text-align:center;color:black;}
.cf-logo{font-size:28px;color:#f48120;font-weight:bold;}
.cf-bar{width:200px;height:6px;background:#eee;margin:10px auto;border-radius:10px;overflow:hidden;}
.cf-fill{width:0;height:100%;background:#f48120;animation:load 3s forwards;}
@keyframes load{100%{width:100%;}}

/* LOGIN */
#loginPage{
display:none;height:100vh;background:#0f2027;color:white;
justify-content:center;align-items:center;flex-direction:column;
}

/* SIDEBAR */
.sidebar{
position:fixed;width:200px;height:100%;
background:#111;padding-top:20px;display:none;
}
.sidebar a{display:block;padding:12px;color:white;cursor:pointer;}
.sidebar a:hover{background:#f48120;}

.main{
margin-left:200px;padding:20px;
display:none;background:#0f2027;color:white;min-height:100vh;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;margin:10px 0;border-radius:10px;
}

button{
padding:8px 12px;border:none;border-radius:6px;
background:#f48120;color:white;cursor:pointer;
}

input{padding:8px;border-radius:6px;border:none;margin:3px;}

/* CHAT */
#chatBox{
height:250px;overflow:auto;
background:#111;padding:10px;border-radius:10px;
}
.msg{margin-bottom:10px;}
.msg img{width:120px;border-radius:6px;margin-top:5px;}
</style>
</head>

<body>

<!-- CLOUDFARE -->
<div id="loader">
<div class="cf-box">
<div class="cf-logo">Cloudflare</div>
<div class="cf-bar"><div class="cf-fill"></div></div>
<p>Checking your browser...</p>
</div>
</div>

<!-- LOGIN -->
<div id="loginPage">
<h2>Login</h2>
<input id="userEmail" placeholder="Email">
<input id="userPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a onclick="show('home')">Home</a>
<a onclick="show('server')">Server</a>
<a onclick="show('community')">Community</a>
</div>

<!-- MAIN -->
<div class="main" id="main">

<!-- HOME -->
<div id="home" class="card">
<h2>Welcome to Choco SMP</h2>
<p id="time"></p>
</div>

<!-- SERVER -->
<div id="server" class="card" style="display:none;">
<h3>IP: play.chocosmp.fun</h3>

<div style="background:#111;padding:10px;border-radius:10px;">
<h3>#rules</h3>
<img src="https://via.placeholder.com/800x200?text=CHOCO+SMP+RULES" style="width:100%;border-radius:8px;">
<p>Respect • No Hack • No Grief • Have Fun</p>
</div>
</div>

<!-- COMMUNITY -->
<div id="community" class="card" style="display:none;">

<h3>💬 Chat</h3>

<input id="name" placeholder="Name">
<div id="chatBox"></div>

<input id="msg" placeholder="Message">
<input type="file" id="img">
<button onclick="send()">Send</button>

</div>

</div>

<!-- MUSIC -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/Ex49z5brxbA?autoplay=1&loop=1&playlist=Ex49z5brxbA"
allow="autoplay"></iframe>

<script>
setTimeout(()=>{
loader.style.display="none";
loginPage.style.display="flex";
},3000);

function login(){
loginPage.style.display="none";
sidebar.style.display="block";
main.style.display="block";
}

function show(id){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");
document.getElementById(id).style.display="block";
}

/* CHAT SYSTEM */
let messages=[];

function send(){
let name=document.getElementById("name").value||"User";
let text=document.getElementById("msg").value;
let file=document.getElementById("img").files[0];

let msgObj={name,text,time:Date.now()};

if(file){
let reader=new FileReader();
reader.onload=e=>{
msgObj.img=e.target.result;
messages.push(msgObj);
render();
};
reader.readAsDataURL(file);
}else{
messages.push(msgObj);
render();
}

msg.value="";
img.value="";
}

function render(){
let box=document.getElementById("chatBox");
box.innerHTML="";
let now=Date.now();

messages=messages.filter(m=>now-m.time<30*60*1000);

messages.forEach(m=>{
let div=document.createElement("div");
div.className="msg";
div.innerHTML="<b>"+m.name+":</b> "+(m.text||"");
if(m.img) div.innerHTML+="<br><img src='"+m.img+"'>";
box.appendChild(div);
});

box.scrollTop=box.scrollHeight;
}

setInterval(render,2000);

setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
