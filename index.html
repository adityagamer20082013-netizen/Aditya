<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

/* CLOUDFLARE LOADER */
#cfLoader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#f6f7f9;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.cf-box{
background:white;
color:black;
padding:40px;
border-radius:10px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.cf-spinner{
width:40px;height:40px;
border:4px solid #ddd;
border-top:4px solid orange;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

/* VIDEO BACKGROUND */
#userBackgroundVideo{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* LOGIN */
#loginPage{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
z-index:1;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:rgba(0,0,0,0.8);
padding-top:20px;
display:none;
z-index:2;
}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
}
.sidebar a:hover{
background:#00ffcc;
color:black;
}

/* MAIN */
.main{
margin-left:210px;
padding:20px;
display:none;
z-index:2;
position:relative;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
padding:15px;
margin:10px;
border-radius:15px;
backdrop-filter:blur(10px);
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#42e695,#7873f5);
color:white;
cursor:pointer;
}

.rainbow{
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video id="userBackgroundVideo" autoplay loop muted>
  <source src="minecraft_shader_video.mp4" type="video/mp4">
</video>

<!-- CLOUDFLARE LOADER -->
<div id="cfLoader">
  <div class="cf-box">
    <h2>Just a moment...</h2>
    <p>Checking your browser before accessing chocosmp.fun</p>
    <div class="cf-spinner"></div>
    <p style="font-size:12px;color:gray;">Please wait...</p>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPage">
<h1 class="rainbow">Choco SMP Login</h1>

<div class="card">
<h3>User Login</h3>
<input id="userEmail" placeholder="Email">
<input id="userPass" type="password" placeholder="Password">
<button onclick="loginUser()">Login</button>
</div>

<div class="card">
<h3>Admin Login</h3>
<input id="adminEmail" placeholder="Email">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h2 class="rainbow" style="text-align:center;">Choco SMP</h2>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('server')">Server</a>
<a onclick="showPage('community')">Community</a>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div id="home" class="card">
<h2>Welcome Gamer 😎</h2>
<p id="time"></p>
</div>

<div id="server" class="card" style="display:none;">
<h2>🎮 Server</h2>
<p>IP: play.chocosmp.fun</p>
<button onclick="copyIP()">Copy IP</button>
</div>

<div id="community" class="card" style="display:none;">
<h2>🌐 Community</h2>
<a href="https://discord.gg/dNhUUsaz75" target="_blank"><button>Discord</button></a>
<a href="https://www.youtube.com/channel/UCMhd7jqZzvhtqrkVOqgrmKg" target="_blank"><button>YouTube</button></a>
<a href="https://www.instagram.com/edit_with_awais/" target="_blank"><button>Instagram</button></a>
</div>

<div id="adminPanel" class="card" style="display:none;">
<h2>👑 Admin Panel</h2>
<button>Start Server</button>
<button>Stop Server</button>
<button>Restart Server</button>
</div>

<!-- MUSIC -->
<iframe 
width="0" 
height="0"
src="https://www.youtube.com/embed/Ex49z5brxbA?autoplay=1&loop=1&playlist=Ex49z5brxbA&controls=0" 
frameborder="0" 
allow="autoplay">
</iframe>

<script>
// CLOUDFLARE LOADER
setTimeout(()=>{
document.getElementById("cfLoader").style.display="none";
document.getElementById("loginPage").style.display="flex";
},4000);

// LOGIN
const userE="chocosmp@gmail.com";
const userP="chocosmp123";
const adminE="admin@gmail.com";
const adminP="admin2013";

function loginUser(){
if(userEmail.value===userE && userPass.value===userP){
start("user");
}else alert("Wrong User");
}

function loginAdmin(){
if(adminEmail.value===adminE && adminPass.value===adminP){
start("admin");
}else alert("Wrong Admin");
}

function start(type){
loginPage.style.display="none";
sidebar.style.display="block";
main.style.display="block";

if(type==="admin"){
hideAll();
adminPanel.style.display="block";
}else{
showPage("home");
}
}

function showPage(p){
hideAll();
document.getElementById(p).style.display="block";
}

function hideAll(){
document.querySelectorAll(".main .card").forEach(el=>el.style.display="none");
}

function logout(){location.reload();}

setInterval(()=>{
time.innerText=new Date().toLocaleTimeString();
},1000);

function copyIP(){
navigator.clipboard.writeText("play.chocosmp.fun");
alert("Copied ✅");
}
</script>

</body>
</html>
