<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Gamer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  color: white;
  text-align: center;
  background: url("https://images.unsplash.com/photo-1605902711622-cfb43c4437d1") no-repeat center/cover;
}

/* DARK OVERLAY */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  top:0;
  left:0;
}

/* CONTENT FIX */
body * {
  position: relative;
  z-index: 1;
}

/* TITLE */
h1 {
  margin-top: 30px;
  text-shadow: 0 0 10px red, 0 0 30px red;
}

/* CARD */
#auth, #dashboard {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  margin: 30px auto;
  box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

/* INPUT */
input {
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  width: 90%;
}

/* BUTTON */
.btn {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.yt {background:red;}
.insta {background:purple;}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px white;
}
</style>
</head>

<body>

<h1>🔥 AdityaGamerYT 🔥</h1>
<p>🎮 Minecraft Player</p>

<div id="auth">

<input type="text" id="name" placeholder="Full Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button class="btn yt" onclick="register()">Register</button>
<button class="btn insta" onclick="login()">Login</button>

<br><br>

<div id="recaptcha-container"></div>

<input type="text" id="phone" placeholder="Phone Number"><br>
<button class="btn yt" onclick="sendOTP()">Send OTP</button><br>

<input type="text" id="otp" placeholder="Enter OTP"><br>
<button class="btn insta" onclick="verifyOTP()">Verify OTP</button>

</div>

<div id="dashboard" style="display:none;">
<h2>Welcome 🎉</h2>
<p id="user"></p>
<button class="btn yt" onclick="logout()">Logout</button>
</div>

<!-- FIREBASE (WORKING VERSION) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Recaptcha
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
  'recaptcha-container', {size:'normal'}
);

// REGISTER
function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(()=> alert("✅ Registered"))
  .catch(err => alert(err.message));
}

// LOGIN
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then((userCred)=>{
    document.getElementById("auth").style.display="none";
    document.getElementById("dashboard").style.display="block";
    document.getElementById("user").innerText = userCred.user.email;
  })
  .catch(err => alert(err.message));
}

// SEND OTP
function sendOTP(){
  const phone = document.getElementById("phone").value;

  auth.signInWithPhoneNumber("+91"+phone, recaptchaVerifier)
  .then(res=>{
    window.confirmationResult = res;
    alert("📩 OTP Sent");
  })
  .catch(err => alert(err.message));
}

// VERIFY OTP
function verifyOTP(){
  const otp = document.getElementById("otp").value;

  confirmationResult.confirm(otp)
  .then(()=> alert("✅ Phone Verified"))
  .catch(err => alert(err.message));
}

// LOGOUT
function logout(){
  auth.signOut().then(()=> location.reload());
}
</script>

</body>
</html>
