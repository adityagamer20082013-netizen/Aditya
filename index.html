<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP Dashboard</title>

<style>
html,body{margin:0;padding:0;font-family:sans-serif;overflow-x:hidden;color:#fff;text-align:center}

/* 🌧️ FULL VIDEO */
#userBgVideo{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* 🌈 RAINBOW TEXT */
.rainbow{
font-weight:bold;
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbowMove 3s linear infinite;
text-shadow:0 0 10px #fff,0 0 20px cyan;
}
@keyframes rainbowMove{
0%{background-position:0%}
100%{background-position:200%}
}

/* PANELS */
#login,#dashboard,#adminPanel{padding:20px;position:relative;z-index:1}

/* CARDS */
.card{
background:rgba(0,0,0,0.5);
margin:15px auto;
padding:20px;
border-radius:20px;
width:320px;
box-shadow:0 0 15px #fff;
}

/* BUTTON */
button{
padding:10px 20px;
border:none;
border-radius:10px;
margin:8px;
background:linear-gradient(45deg,#42e695,#7873f5);
color:#fff;
cursor:pointer;
}

/* XP */
#xpBarContainer{width:100%;height:20px;background:rgba(255,255,255,0.2);border-radius:12px;overflow:hidden}
#xpBar{width:0%;height:100%;background:linear-gradient(90deg,#42e695,#7873f5)}

/* SPARKLE */
.sparkle{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;animation:s 0.8s linear}
@keyframes s{0%{opacity:1}100%{opacity:0}}

/* CONFETTI */
.confetti{position:absolute;width:6px;height:6px;top:0;animation:f 3s linear}
@keyframes f{100%{top:100%;opacity:0}}

input{padding:10px;border-radius:8px;border:none;margin:5px;width:80%}
</style>
</head>

<body>

<!-- 🌧️ VIDEO -->
<video autoplay muted loop id="userBgVideo" style="display:none;">
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<!-- 🌈 TITLE -->
<h1>Welcome to <span class="rainbow">Choco SMP</span></h1>

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>User Login</h3>
<input id="phone" placeholder="Phone"><br>
<input id="otp" placeholder="OTP"><br>
<button onclick="loginUser()">Login</button>
</div>

<div class="card">
<h3>Admin Login</h3>
<input id="adminEmail" placeholder="Email"><br>
<input id="adminPass" placeholder="Password"><br>
<button onclick="loginAdmin()">Login</button>
</div>
</div>

<!-- USER DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="card">
<h3 id="greeting">Hello</h3>
<p id="time"></p>
</div>

<div class="card">
<h3>Server: Choco SMP</h3>
<p>IP: play.adityamc.fun</p>
<button onclick="copyIP()">Copy IP</button>
</div>

<div class="card">
<h3>Social</h3>
<a href="https://instagram.com/_btwitsadityagg" target="_blank"><button>Instagram</button></a>
<a href="https://youtube.com/@AdityaGamerYT-s-3p" target="_blank"><button>YouTube</button></a>
</div>

<div class="card">
<h3>Level <span id="level">1</span></h3>
<p>XP: <span id="xp">0</span></p>
<div id="xpBarContainer"><div id="xpBar"></div></div>
<button onclick="gainXP()">Gain XP</button>
</div>

<div class="card">
<button onclick="openLiveLink()">Open Live Link</button>
</div>

<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;">
<div class="card">
<h3>Admin Panel</h3>
<p>Choco SMP Control</p>
</div>
<button onclick="logout()">Logout</button>
</div>

<script>
const allowedPhone="7696044754",otp="2013";
const adminEmail="admin@gmail.com",adminPass="admin2013";

function loginUser(){
if(phone.value===allowedPhone && otp.value==="2013"){
login.style.display="none";
dashboard.style.display="block";
userBgVideo.style.display="block";
}
else alert("Wrong");
}

function loginAdmin(){
if(adminEmail.value===adminEmail && adminPass.value===adminPass){
login.style.display="none";
adminPanel.style.display="block";
userBgVideo.style.display="none";
}
else alert("Wrong");
}

function logout(){location.reload();}

/* TIME */
setInterval(()=>{
let n=new Date();
time.innerText=n.toLocaleTimeString();
},1000);

/* XP */
let xp=0,lvl=1;
function gainXP(){
xp+=10;
if(xp>=100){xp=0;lvl++;addConfetti();}
xpBar.style.width=xp+"%";
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=lvl;
}

/* COPY */
function copyIP(){
navigator.clipboard.writeText("play.adityamc.fun");
alert("Copied");
}

/* CONFETTI */
function addConfetti(){
for(let i=0;i<30;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* LINK */
function openLiveLink(){
let url=prompt("Enter link","https://adityagamergg2008");
if(url) window.open(url);
}
</script>

</body>
</html>
