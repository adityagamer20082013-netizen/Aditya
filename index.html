<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
color:white;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
scroll-behavior:smooth;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
padding:15px 30px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
}

nav a:hover{
color:#00ffcc;
}

/* 🌈 Rainbow */
.rainbow{
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:move 3s linear infinite;
}
@keyframes move{
0%{background-position:0%}
100%{background-position:200%}
}

/* SECTION */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

/* HERO */
.hero{
text-align:center;
}

.hero h1{
font-size:40px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
padding:25px;
margin:15px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00ffcc;
}

/* BUTTON */
button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#42e695,#7873f5);
color:white;
cursor:pointer;
}

button:active{
transform:scale(0.9);
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#000;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="rainbow">Choco SMP</div>
<div>
<a href="#home">Home</a>
<a href="#server">Server</a>
<a href="#community">Community</a>
</div>
</nav>

<!-- HOME -->
<section id="home" class="hero">
<h1>Welcome to <span class="rainbow">Choco SMP</span></h1>
<h3 id="greeting">Hello Gamer 😎</h3>
<p id="time"></p>
</section>

<!-- SERVER -->
<section id="server">
<div class="card">
<h2>🎮 Server Info</h2>
<p>IP: play.chocosmp.fun</p>
<button onclick="copyIP()">Copy IP</button>
</div>
</section>

<!-- COMMUNITY -->
<section id="community">
<div class="card">
<h2>🌐 Join Community</h2>

<a href="https://discord.gg/dNhUUsaz75" target="_blank">
<button>💬 Discord</button>
</a>

<a href="https://www.youtube.com/channel/UCMhd7jqZzvhtqrkVOqgrmKg" target="_blank">
<button>🔥 YouTube</button>
</a>

<a href="https://www.instagram.com/edit_with_awais/" target="_blank">
<button>📸 Instagram</button>
</a>

</div>
</section>

<!-- FOOTER -->
<footer>
<p>© 2026 Choco SMP | All Rights Reserved</p>
</footer>

<script>
// TIME
setInterval(()=>{
let n=new Date();
time.innerText=n.toLocaleTimeString();

let h=n.getHours();
let g="Hello";
if(h<12) g="🌅 Morning";
else if(h<18) g="☀️ Afternoon";
else g="🌙 Night";

greeting.innerText=g+" Gamer 😎";
},1000);

// COPY IP
function copyIP(){
navigator.clipboard.writeText("play.chocosmp.fun");
alert("IP Copied ✅");
}
</script>

</body>
</html>
