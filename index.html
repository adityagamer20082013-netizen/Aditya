<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP Dashboard</title>

<style>
html,body{margin:0;padding:0;font-family:sans-serif;color:#fff;text-align:center;overflow-x:hidden}

/* VIDEO */
#userBgVideo{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
display:none;
}

/* RAINBOW */
.rainbow{
font-weight:bold;
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbowMove 3s linear infinite;
}
@keyframes rainbowMove{
0%{background-position:0%}
100%{background-position:200%}
}

/* UI */
.card{
background:rgba(0,0,0,0.5);
margin:15px auto;
padding:20px;
border-radius:20px;
width:320px;
box-shadow:0 0 15px #fff;
}
button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#42e695,#7873f5);
color:white;
cursor:pointer;
}
input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:80%;
}

/* XP */
#xpBarContainer{width:100%;height:20px;background:rgba(255,255,255,0.2);border-radius:10px}
#xpBar{height:100%;width:0%;background:linear-gradient(90deg,#42e695,#7873f5)}

/* EFFECTS */
.sparkle{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;animation:s 0.8s}
@keyframes s{100%{opacity:0}}
.confetti{position:absolute;width:6px;height:6px;top:0;animation:f 3s}
@keyframes f{100%{top:100%;opacity:0}}
</style>
</head>

<body>

<video autoplay muted loop id="userBgVideo">
<source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<h1>Welcome to <span class="rainbow">Choco SMP</span></h1>

<div id="login">

<div class="card">
<h3>User Login</h3>
<input id="userEmail" placeholder="Enter Gmail"><br>
<input type="password" id="userPass" placeholder="Enter Password"><br>
<button onclick="loginUser()">Login</button>
</div>

<div class="card">
<h3>Admin Login</h3>
<input id="adminEmail" placeholder="Email"><br>
<input type="password" id="adminPass" placeholder="Password"><br>
<button onclick="loginAdmin()">Login</button>
</div>

</div>

<div id="dashboard" style="display:none;">

<div class="card">
<h3 id="greeting">Hello Gamer</h3>
<p id="time"></p>
</div>

<div class="card">
<h3>🎮 Choco SMP</h3>
<p>IP: play.adityamc.fun</p>
<button onclick="copyIP()">Copy IP</button>
</div>

<!-- 🔥 UPDATED SOCIAL LINKS -->
<div class="card">
<h3>🌐 Community</h3>

<a href="https://discord.gg/dNhUUsaz75" target="_blank">
<button>💬 Discord</button>
</a>

<a href="https://www.youtube.com/channel/UCMhd7jqZzvhtqrkVOqgrmKg" target="_blank">
<button>🔥 YouTube</button>
</a>

<a href="https://www.instagram.com/edit_with_awais/" target="_blank">
<button>📸 Instagram</button>
</a>

</div>

<div class="card">
<h3>Level <span id="level">1</span></h3>
<p>XP: <span id="xp">0</span></p>
<div id="xpBarContainer"><div id="xpBar"></div></div>
<button onclick="gainXP()">Gain XP</button>
</div>

<div class="card">
<button onclick="openLiveLink()">Open Live Link</button>
</div>

<button onclick="logout()">Logout</button>
</div>

<div id="adminPanel" style="display:none;">
<div class="card">
<h3>👑 Admin Panel</h3>
<p>Choco SMP Control</p>
</div>
<button onclick="logout()">Logout</button>
</div>

<script>
// USER LOGIN
const userEmailFixed="chocosmp@gmail.com";
const userPassFixed="chocosmp123";

function loginUser(){
if(userEmail.value===userEmailFixed && userPass.value===userPassFixed){
login.style.display="none";
dashboard.style.display="block";
userBgVideo.style.display="block";
}else alert("Wrong User ❌");
}

// ADMIN LOGIN
const adminEmailFixed="admin@gmail.com";
const adminPassFixed="admin2013";

function loginAdmin(){
if(adminEmail.value===adminEmailFixed && adminPass.value===adminPassFixed){
login.style.display="none";
adminPanel.style.display="block";
userBgVideo.style.display="none";
}else alert("Wrong Admin ❌");
}

function logout(){location.reload();}

// TIME
setInterval(()=>{
let n=new Date();
time.innerText=n.toLocaleTimeString();

let h=n.getHours();
let g="Hello";
if(h<12) g="🌅 Morning";
else if(h<18) g="☀️ Afternoon";
else g="🌙 Night";

greeting.innerText=g+" Gamer 😎";
},1000);

// XP
let xp=0,level=1;
function gainXP(){
xp+=10;
if(xp>=100){xp=0;level++;addConfetti();}
xpBar.style.width=xp+"%";
xp.innerText=xp;
document.getElementById("level").innerText=level;
}

// CONFETTI
function addConfetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

// COPY
function copyIP(){
navigator.clipboard.writeText("play.adityamc.fun");
alert("Copied ✅");
}

// LINK
function openLiveLink(){
let url=prompt("Enter link","https://adityagamergg2008");
if(url) window.open(url);
}
</script>

</body>
</html>
