<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choco SMP Dashboard</title>

<style>
html,body{
margin:0;
padding:0;
font-family:sans-serif;
color:#fff;
text-align:center;
overflow-x:hidden;

/* 🌧️ Minecraft dark rainy background */
background:url('https://images.unsplash.com/photo-1600375462888-8b6b5f0c4c1b?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
background-size:cover;
}

/* dark overlay */
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* 🌈 rainbow */
.rainbow{
font-weight:bold;
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbowMove 3s linear infinite;
}
@keyframes rainbowMove{
0%{background-position:0%}
100%{background-position:200%}
}

/* UI */
.card{
background:rgba(0,0,0,0.5);
margin:15px auto;
padding:20px;
border-radius:20px;
width:320px;
box-shadow:0 0 15px #fff;
}

button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#42e695,#7873f5);
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:80%;
}
</style>
</head>

<body>

<h1>Welcome to <span class="rainbow">Choco SMP</span></h1>

<!-- LOGIN -->
<div id="login">

<div class="card">
<h3>User Login</h3>
<input id="userEmail" placeholder="Enter Gmail"><br>
<input type="password" id="userPass" placeholder="Enter Password"><br>
<button onclick="loginUser()">Login</button>
</div>

<div class="card">
<h3>Admin Login</h3>
<input id="adminEmail" placeholder="Email"><br>
<input type="password" id="adminPass" placeholder="Password"><br>
<button onclick="loginAdmin()">Login</button>
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="card">
<h3 id="greeting">Hello Gamer</h3>
<p id="time"></p>
</div>

<div class="card">
<h3>🎮 Choco SMP</h3>
<p>IP: play.chocosmp.fun</p>
<button onclick="copyIP()">Copy IP</button>
</div>

<div class="card">
<h3>🌐 Community</h3>

<a href="https://discord.gg/dNhUUsaz75" target="_blank">
<button>💬 Discord</button>
</a>

<a href="https://www.youtube.com/channel/UCMhd7jqZzvhtqrkVOqgrmKg" target="_blank">
<button>🔥 YouTube</button>
</a>

<a href="https://www.instagram.com/edit_with_awais/" target="_blank">
<button>📸 Instagram</button>
</a>

</div>

<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;">
<div class="card">
<h3>👑 Admin Panel</h3>
<p>Choco SMP Control</p>
</div>
<button onclick="logout()">Logout</button>
</div>

<!-- 🎧 MUSIC -->
<audio autoplay loop id="bgMusic">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6c6e.mp3?filename=calm-minecraft-style-ambient-110624.mp3" type="audio/mp3">
</audio>

<script>
// USER LOGIN
const userEmailFixed="chocosmp@gmail.com";
const userPassFixed="chocosmp123";

function loginUser(){
if(userEmail.value===userEmailFixed && userPass.value===userPassFixed){
login.style.display="none";
dashboard.style.display="block";
}else{
alert("Wrong User ❌");
}
}

// ADMIN LOGIN
const adminEmailFixed="admin@gmail.com";
const adminPassFixed="admin2013";

function loginAdmin(){
if(adminEmail.value===adminEmailFixed && adminPass.value===adminPassFixed){
login.style.display="none";
adminPanel.style.display="block";
}else{
alert("Wrong Admin ❌");
}
}

function logout(){location.reload();}

// TIME + GREETING
setInterval(()=>{
let n=new Date();
time.innerText=n.toLocaleTimeString();

let h=n.getHours();
let g="Hello";
if(h<12) g="🌅 Morning";
else if(h<18) g="☀️ Afternoon";
else g="🌙 Night";

greeting.innerText=g+" Gamer 😎";
},1000);

// COPY IP
function copyIP(){
navigator.clipboard.writeText("play.chocosmp.fun");
alert("IP Copied: play.chocosmp.fun ✅");
}

// MUSIC LOW VOLUME
const music=document.getElementById("bgMusic");
music.volume=0.2;
</script>

</body>
</html>
