<!DOCTYPE html>
<html>
<head>
  <title>AdityaGamerYT 🔥</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(45deg, red, blue, purple, cyan);
      background-size: 400% 400%;
      animation: bg 8s infinite;
      color: white;
      text-align: center;
    }

    @keyframes bg {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 30px;
      text-shadow: 0 0 20px black;
    }

    .welcome {
      font-size: 28px;
      margin-top: 20px;
      color: yellow;
      text-shadow: 0 0 10px black;
    }

    .subtext {
      font-size: 18px;
      margin-bottom: 20px;
      color: #fff;
    }

    input {
      padding: 12px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      width: 200px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: lime;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: lime;
      color: black;
      transform: scale(1.1);
    }

    #dashboard {
      display: none;
      margin-top: 40px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      width: 260px;
      box-shadow: 0 0 20px black;
    }
  </style>
</head>

<body>

<h1>🔥 AdityaGamerYT 🔥</h1>

<div id="login">
  <input type="text" id="phone" placeholder="+91XXXXXXXXXX"><br>
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send OTP</button><br>
  <input type="text" id="otp" placeholder="Enter OTP"><br>
  <button onclick="verifyOTP()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="welcome">🔥 Welcome to AdityaGamerYT 🔥</div>
  <div class="subtext">👉 Follow on Instagram & Subscribe on YouTube 👇</div>

  <div class="card">
    <h3>📸 Instagram</h3>
    <a href="https://instagram.com/_btwitsadityagg" target="_blank">
      <button>😎 Follow Now</button>
    </a>
  </div>

  <div class="card">
    <h3>📺 YouTube</h3>
    <a href="https://www.youtube.com/@AdityaGamerYT-s-3p" target="_blank">
      <button>🔥 Subscribe Now</button>
    </a>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();

  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');

  function sendOTP(){
    const phoneNumber = document.getElementById("phone").value;

    auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
      .then(function(confirmationResult){
        window.confirmationResult = confirmationResult;
        alert("OTP Sent 🔥");
      }).catch(function(error){
        alert(error.message);
      });
  }

  function verifyOTP(){
    const code = document.getElementById("otp").value;

    confirmationResult.confirm(code)
      .then(function(result){
        document.getElementById("login").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
      }).catch(function(error){
        alert("Wrong OTP ❌");
      });
  }
</script>

</body>
</html>
